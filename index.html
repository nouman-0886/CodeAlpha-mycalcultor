<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="balance-sheet.png">
</head>

<body>
    <div class="main">
        <div class="display">
            <div class="qus">
                <input type="text" name="question" id="question" readonly>
            </div>
            <div class="ans">
                <input type="text" name="ans" id="ans" readonly>
            </div>
        </div>
        <div class="buttons">
            <div><button class="btn-1 clearAll">C</button></div>
            <div><button class="btn-2 delte">DEL</button></div>
            <div><button class="btn prcent">%</button></div>
            <div><button class="btn color">+</button></div>
            <div><button class="btn">1</button></div>
            <div><button class="btn">2</button></div>
            <div><button class="btn">3</button></div>
            <div><button class="btn color">-</button></div>
            <div><button class="btn">4</button></div>
            <div><button class="btn">5</button></div>
            <div><button class="btn">6</button></div>
            <div><button class="btn color">/</button></div>
            <div><button class="btn">7</button></div>
            <div><button class="btn">8</button></div>
            <div><button class="btn">9</button></div>
            <div><button class="btn color">*</button></div>
            <div><button class="btn"  style="border-bottom-left-radius: 15px;">0</button></div>
            <div><button class="btn">.</button></div>
            <div><button class="btn-3 equals">=</button></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
